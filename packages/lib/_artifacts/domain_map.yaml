  - name: 'Token Lifecycle'
    slug: 'token-lifecycle'
    domain: 'advanced-usage'
    description: 'Handle token generation, expiration, validation workflow, and form integration'
    type: 'lifecycle'
    packages:
      - '@marsidev/react-turnstile'
    covers:
      - 'getResponse() and getResponsePromise() methods'
      - 'onSuccess callback'
      - 'Token expiration handling (onExpire)'
      - 'Widget reset patterns'
      - 'Form integration'
      - 'Server-side validation (user-implemented)'
    tasks:
      - 'Get token from widget'
      - 'Handle token expiration'
      - 'Reset widget after form submission'
      - 'Integrate with form validation'
      - 'Send token to server for validation'
    failure_modes:
      - mistake: 'Token expires before form submission'
        mechanism: 'Turnstile tokens are single-use and expire after timeout, requiring re-verification'
        wrong_pattern: |
          const token = ref.current?.getResponse()
          // User takes too long to submit form
          // Token is now expired/invalid
          await submitForm(token) // Fails
        correct_pattern: |
          // Get token at submission time
          const token = ref.current?.getResponse()
          await submitForm(token)
          ref.current?.reset() // Reset for next submission
        source: 'docs/handling-expiration.mdx'
        priority: 'HIGH'
        status: 'active'
        skills: ['token-lifecycle']
      - mistake: 'Calling imperative methods before widget is loaded'
        mechanism: 'Methods like getResponse() fail silently with console warning if called before ready'
        wrong_pattern: |
          const ref = useRef<TurnstileInstance>(null)
          useEffect(() => {
            // Widget not rendered yet!
            const token = ref.current?.getResponse() // undefined
          }, [])
          return <Turnstile ref={ref} siteKey="xxx" />
        correct_pattern: |
          // Wait for onSuccess callback or check widget state
          <Turnstile
            ref={ref}
            siteKey="xxx"
            onSuccess={(token) => handleToken(token)}
          />
        source: 'source code (console.warn checks)'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['token-lifecycle']
      - mistake: 'Expecting server validation to be built-in'
        mechanism: 'Library provides only TypeScript types, not validation logic - users must implement server call'
        wrong_pattern: |
          import { validateTurnstile } from '@marsidev/react-turnstile'
          // ^ This doesn't exist!
        correct_pattern: |
          // Users implement their own server validation
          const res = await fetch('/api/verify', {
            method: 'POST',
            body: JSON.stringify({ token }),
          })
        source: 'Maintainer interview'
        priority: 'HIGH'
        status: 'active'
        skills: ['token-lifecycle']

