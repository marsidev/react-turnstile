name: Zizmor

# No `paths:` filter: this is a required status check, so it must run (and
# report) on every PR. A path-filtered required check never reports on PRs that
# don't touch the filtered paths, which blocks them from merging. Scanning the
# unchanged workflows on every PR is cheap (~10s).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Print findings and FAIL the job on any finding, so this acts as a
          # blocking required check. (The default uploads to the Security tab
          # and does not fail the build.) Mark this job required in branch
          # protection / rulesets to block merges.
          advanced-security: false
