name: Check Stale Skills

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install
        run: pnpm install --frozen-lockfile

      # continue-on-error (not `|| true`) so the step's outcome stays `failure`
      # when skills are stale, which is what gates the PR-creation step below.
      - name: Check for stale skills
        id: stale
        continue-on-error: true
        working-directory: packages/lib
        run: pnpm exec intent stale --json > stale-report.json

      - name: Create PR if skills are stale
        if: steps.stale.outcome == 'failure'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update stale skills'
          title: 'Update stale skills'
          body: |
            This PR was created because the following skills may be out of date:

            Please review and update the skills using:
            ```
            pnpm exec intent scaffold
            ```

            Then run validation:
            ```
            pnpm exec intent validate
            ```
          branch: update-stale-skills
