name: Check Stale Skills

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24.x

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check for stale skills
        id: stale
        working-directory: packages/lib
        run: pnpm exec intent stale --json > stale-report.json || true

      - name: Create PR if skills are stale
        if: steps.stale.outcome == 'failure'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update stale skills'
          title: 'Update stale skills'
          body: |
            This PR was created because the following skills may be out of date:

            Please review and update the skills using:
            ```
            pnpm exec intent scaffold
            ```

            Then run validation:
            ```
            pnpm exec intent validate
            ```
          branch: update-stale-skills
